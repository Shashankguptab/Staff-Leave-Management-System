{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Staff</title>
    <link rel="stylesheet" href="{% static 'css/add_staff.css' %}">
</head>

<body>
    <h1 class="page-title">Add Staff</h1>
    <form method="Post" class="staff-form">
        {% csrf_token %}
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" id="" required>
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" id="" required>
        <button class="submit-btn" type="submit">Create Staff</button>
        <a class="back-btn" href="{% url 'manage_staff' %}">Back to Manage Staff</a>
</body>

</html>
